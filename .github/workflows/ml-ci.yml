name: ML Training CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # 1. Checkout Repository
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ============================================================
      # 2. Setup Python
      # ============================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ============================================================
      # 3. Install Dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn imbalanced-learn mlflow==2.19.0 matplotlib seaborn

      # ============================================================
      # 4. Training Model (MLflow Project)
      # ============================================================
      - name: Train model
        working-directory: MLProject
        run: python modelling.py

      # ============================================================
      # 5. Upload Artefak ke GitHub (Skilled)
      # ============================================================
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/

      - name: Commit artifacts to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add MLProject/artifacts/ || true
          git diff --staged --quiet || git commit -m "CI: Update model artifacts [skip ci]"
          git push || true

  # ============================================================
  # 6. Build Docker Image (Advanced)
  # ============================================================
  build-docker:
    runs-on: ubuntu-latest
    needs: train-model

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-model-artifacts
          path: MLProject/

      - name: Find model URI
        id: find_model
        run: |
          MODEL_URI=$(find MLProject/mlruns -path "*/artifacts/model" -type d | head -1)
          echo "model_uri=$MODEL_URI" >> $GITHUB_OUTPUT
          echo "Found model at: $MODEL_URI"

      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker \
            -m "${{ steps.find_model.outputs.model_uri }}" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model" \
            --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker tag "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model" \
            "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest"
          echo "✅ Docker image pushed to Docker Hub"
