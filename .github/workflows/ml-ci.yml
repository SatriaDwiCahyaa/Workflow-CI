name: ML Training CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  train-model:
    runs-on: ubuntu-22.04

    steps:
      # ============================================================
      # 1. Checkout Repository
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ============================================================
      # 2. Setup Python
      # ============================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ============================================================
      # 3. Install Dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn imbalanced-learn mlflow==2.19.0 matplotlib seaborn

      # ============================================================
      # 4. Training Model (MLflow Project)
      # ============================================================
      - name: Train model
        working-directory: MLProject
        run: mlflow run . --env-manager=local

      # ============================================================
      # 5. Upload Artefak ke GitHub (Skilled)
      # ============================================================
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/

      - name: Commit artifacts to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add MLProject/artifacts/ || true
          git diff --staged --quiet || git commit -m "CI: Update model artifacts [skip ci]"
          git push || true

  # ============================================================
  # 6. Build Docker Image (Advanced)
  # ============================================================
  build-docker:
    runs-on: ubuntu-22.04
    needs: train-model

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-model-artifacts
          path: MLProject/

      - name: Find model URI
        id: find_model
        run: |
          MODEL_URI=$(find MLProject/mlruns -path "*/artifacts/model" -type d | head -1)
          echo "model_uri=$MODEL_URI" >> $GITHUB_OUTPUT
          echo "Found model at: $MODEL_URI"

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "❌ ERROR: DOCKERHUB_USERNAME secret is not set!"
            echo "Go to your repo Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "❌ ERROR: DOCKERHUB_TOKEN secret is not set!"
            exit 1
          fi

      # ============================================================
      # Fix: Ganti mlflow models build-docker dengan custom Docker build
      # Alasan: mlflow models build-docker menjalankan apt-get di dalam
      # container yang rawan network timeout di GitHub Actions runner.
      # Solusi: Gunakan python:3.12-slim base image + install deps via pip
      # sehingga tidak perlu apt-get untuk package besar (libc6, libcap2 dll).
      # ============================================================
      - name: Prepare Docker build context
        run: |
          # Copy model artifacts into Docker build context
          MODEL_URI="${{ steps.find_model.outputs.model_uri }}"
          echo "📦 Model URI: $MODEL_URI"

          # Create build context folder
          mkdir -p docker-build-context

          # Copy Dockerfile and requirements
          cp MLProject/Dockerfile docker-build-context/
          cp MLProject/requirements-serve.txt docker-build-context/

          # Copy model into context
          cp -r "$MODEL_URI" docker-build-context/model

          echo "✅ Docker build context ready"
          ls -la docker-build-context/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker daemon for better network resilience
        run: |
          # Increase Docker build timeout and retries
          sudo mkdir -p /etc/docker
          echo '{
            "dns": ["1.1.1.1", "8.8.8.8"],
            "max-concurrent-downloads": 3
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || true
          sleep 5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker-build-context
          file: docker-build-context/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:${{ github.sha }}
          build-args: |
            MODEL_PATH=model
          # Cache dari Docker Hub untuk mempercepat build
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:buildcache,mode=max
          # Retry network-sensitive layers
          no-cache: false

      - name: Verify Docker image pushed
        run: |
          echo "✅ Docker image pushed successfully:"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:${{ github.sha }}"
